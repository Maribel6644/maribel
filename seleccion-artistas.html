<!doctype html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seleccionar Artistas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1 class="mb-4">Consulta de Tracks Spotify</h1>

<div class="card p-3 mb-4">

<h4>Guardar Token</h4>

<input 
type="text"
id="tokenInput"
class="form-control mb-2"
placeholder="Pega tu token de Spotify"
>

<button class="btn btn-primary" onclick="guardarToken()">
Guardar Token
</button>

</div>

<div class="card p-3 mb-4">

<h4>Selecciona un track</h4>

<select id="trackSelect" class="form-select">

<option value="">Selecciona un track</option>

<option value="6HU7h9RYOaPRFeh0R3UeAr">
deja vu
</option>

<option value="6De0lHrwBfPfrhorm9q1Xl">
me reúso
</option>

<option value="2lTm559tuIvatlT1u0JYG2">
baile inolvidable
</option>

<option value="4iV5W9uYEdYUVa79Axb7Rh">
Smells Like Teen Spirit
</option>

</select>

</div>

<div id="resultado"></div>

<button class="btn btn-danger mt-3" onclick="limpiarPagina()">
Limpiar página
</button>

</div>

<script src="script.js"></script>

</body>
</html>
